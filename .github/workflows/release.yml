name: Release

on:
  push:
    tags:
      - "zotero-wakatime-v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npm run build

      - name: Upload xpi to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .scaffold/build/*.xpi
          generate_release_notes: true
