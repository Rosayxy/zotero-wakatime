<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>
  <checkbox
    id="zotero-prefpane-__addonRef__-enable"
    preference="enable"
    data-l10n-id="pref-enable"
  />
  <separator class="thin" />
  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-apikey"
      data-l10n-id="pref-apikey"
      style="margin-right: 8px;"
    ></html:label>
    <html:input
      type="password"
      id="zotero-prefpane-__addonRef__-apikey"
      preference="apikey"
      style="flex: 1;"
    ></html:input>
  </hbox>
  <separator class="thin" />
  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-category"
      data-l10n-id="pref-category"
      style="margin-right: 8px;"
    ></html:label>
    <menulist
      id="zotero-prefpane-__addonRef__-category"
      preference="category"
    >
      <menupopup>
        <menuitem label="Researching" value="researching" />
        <menuitem label="Learning" value="learning" />
        <menuitem label="Writing Docs" value="writing docs" />
        <menuitem label="Browsing" value="browsing" />
      </menupopup>
    </menulist>
  </hbox>
  <separator class="thin" />
  <checkbox
    id="zotero-prefpane-__addonRef__-debug"
    preference="debug"
    data-l10n-id="pref-debug"
  />
  <separator class="thin" />
  <hbox>
    <html:label
      id="zotero-prefpane-__addonRef__-status"
    ></html:label>
  </hbox>
</groupbox>
<vbox>
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
</vbox>
